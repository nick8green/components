name: build and deploy storybook instance

on:
  workflow_dispatch:
    inputs:
      deploy:
        default: false
        description: 'Whether to deploy to pages'
        required: false
        type: boolean
  workflow_call:
    inputs:
      deploy:
        default: false
        required: false
        type: boolean
    secrets:
      GH_PAT:
        description: 'GitHub Personal Access Token with repo permissions'
        required: true

jobs:
  storybook:
    concurrency:
      cancel-in-progress: false
      group: "pages"
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
    name: 📚 build storybook
    permissions:
      contents: read
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ checkout code
        uses: actions/checkout@v4

      - name: 🧱 setup workspace
        uses: nick8green/workflows/actions/node/setup@db5746daa8f8de518dfd4415827ee49a3bc5a6b8
        with:
          registry: 'https://npm.pkg.github.com'

      - name: 📔 build storybook
        run: yarn build:storybook

      - if: inputs.deploy != true
        name: 📦 upload artifact build only
        uses: actions/upload-pages-artifact@v4
        with:
          name: storybook-build
          path: storybook

      - if: inputs.deploy == true
        name: 📦 upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: storybook

      - if: inputs.deploy == true
        name: 🗒️ setup pages
        uses: actions/configure-pages@v5

      - id: deployment
        if: inputs.deploy == true
        name: 🚀 deploy to github pages
        uses: actions/deploy-pages@v4
